name: Build ScreenPet Standalone Apps

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build ScreenPet (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ScreenPet-Electron/package-lock.json

      - name: Install Dependencies
        run: |
          cd ScreenPet-Electron
          npm ci

      - name: Compile and Package App
        run: |
          cd ScreenPet-Electron
          npm run dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenpet-${{ matrix.os }}
          path: |
            ScreenPet-Electron/dist/*.dmg
            ScreenPet-Electron/dist/*.exe
            ScreenPet-Electron/dist/portable/*.exe
