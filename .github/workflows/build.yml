name: Build and Release ScreenPet

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build ScreenPet (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ScreenPet-Electron/package-lock.json

      - name: Install Dependencies
        run: |
          cd ScreenPet-Electron
          npm ci

      - name: Compile and Package App
        run: |
          cd ScreenPet-Electron
          npm run dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenpet-${{ matrix.os }}
          path: |
            ScreenPet-Electron/dist/*.dmg
            ScreenPet-Electron/dist/*.exe
            ScreenPet-Electron/dist/portable/*.exe

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: screenpet-windows-latest
          path: dist/

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: screenpet-macos-latest
          path: dist/

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/**/*.dmg,dist/**/*.exe"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "v2.0.0"
          name: "ScreenPet v2.0.0"
          body: "Official release of ScreenPet: Desktop Dinosaur Pet.\n\nDownloads:\n- **macOS**: Download the `.dmg` file for Mac.\n- **Windows**: Download the `.exe` file (standalone portable for Windows)."
          allowUpdates: true
